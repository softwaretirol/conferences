ports:
  web:
    port: 80
    hostPort: 80
    redirections:
      entryPoint:
        to: websecure
        scheme: https
        permanent: true

  websecure:
    port: 443
    hostPort: 443

api:
  dashboard: true
  insecure: false

ingressClass:
  enabled: true

providers:
  kubernetesIngress:
     enabled: true
  kubernetesGateway:
     enabled: false
logs:
  general:
    level: DEBUG
additionalArguments:
  - "--certificatesresolvers.le.acme.email=christian@software.tirol"
  - "--certificatesresolvers.le.acme.storage=/data/acme.json"
  - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
  - "--entrypoints.websecure.http.tls.certresolver=le"

deployment:
  enabled: true

nodeSelector:
  node-role.kubernetes.io/control-plane: "true"

tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Equal"
    value: "true"
    effect: "NoSchedule"
  - key: "CriticalAddonsOnly"
    operator: "Exists"
